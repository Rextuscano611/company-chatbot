<!DOCTYPE html>
<html>
<head>

<title>CHAT WITH MAYA</title>

<style>

body{
font-family:Arial;
margin:0;
}

/* chatbot window */

#chat-container{
display:flex;
flex-direction:column;
width:100%;
height:100vh;
background:white;
}

/* header */

#chat-header{
background:#393A56;
color:white;
padding:15px;
font-weight:bold;
}

/* chat messages */

#chatbox{
flex:1;
padding:10px;
overflow-y:auto;
background:#f5f5f5;
}

/* message bubbles */

.message{
margin:10px 0;
padding:8px 12px;
border-radius:10px;
max-width:75%;
}

.user{
background:#6878D6;
color:white;
margin-left:auto;
}

.bot{
background:#e4e6eb;
color:black;
margin-right:auto;
}

/* input area */

#input-area{
display:flex;
border-top:1px solid #ddd;
}

#userInput{
flex:1;
padding:10px;
border:none;
outline:none;
}

button{
padding:10px 15px;
border:none;
background:#6878D6;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div id="chat-container">

<div id="chat-header">
CHAT WITH MAYA 🤖
</div>

<div id="chatbox"></div>

<div id="input-area">
<input id="userInput" placeholder="Ask about our services...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

function showWelcomeMessage(){

let chatbox=document.getElementById("chatbox")

if(chatbox.innerHTML===""){

chatbox.innerHTML+=`
<div class="message bot">
Hi 👋 I'm Maya from SEO Labs.<br>
How can I help you today?
</div>
`

}

}

showWelcomeMessage()

async function sendMessage(){

let input=document.getElementById("userInput")
let message=input.value

if(message==="") return

let chatbox=document.getElementById("chatbox")

chatbox.innerHTML+=`<div class="message user">${message}</div>`

input.value=""

let typing=document.createElement("div")
typing.className="message bot"
typing.id="typing"
typing.innerHTML="Maya is typing..."
chatbox.appendChild(typing)

chatbox.scrollTop=chatbox.scrollHeight

let response=await fetch("http://127.0.0.1:5000/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:message
})

})

let data=await response.json()

document.getElementById("typing").remove()

chatbox.innerHTML+=`<div class="message bot">${data.response}</div>`

chatbox.scrollTop=chatbox.scrollHeight

}

document.getElementById("userInput").addEventListener("keypress",function(event){

if(event.key==="Enter"){
sendMessage()
}

})

</script>

</body>
</html>
